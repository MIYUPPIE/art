# nginx config for the ar-art_web container (mounted at
# /etc/nginx/conf.d/default.conf). Serves the static app and proxies /api to
# the gallery-api container on the same compose network. Nginx Proxy Manager
# terminates TLS in front of this and forwards the domain here.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Room for the biggest allowed upload (80 MB body cap in the API).
    client_max_body_size 90m;

    location /api/ {
        proxy_pass http://api:8787;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Stream uploads through instead of spooling them to disk first.
        proxy_request_buffering off;
        proxy_read_timeout 120s;
    }

    # App shell + code: always revalidate. There is no build fingerprinting, so
    # long cache lifetimes serve stale code after a deploy (43-minute bug, seen
    # in production). 304s keep revalidation cheap.
    location ~* \.(html|js|css|webmanifest)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Compiled tracking targets are fetched as binary.
    location ~* \.mind$ {
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|webp|svg|ico|mp4|webm|glb)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Never serve repo plumbing.
    location ~ ^/(tests/|deploy/|services/|contracts/|node_modules/|package\.json|tools/serve\.mjs) {
        return 404;
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ =404;
    }
}
