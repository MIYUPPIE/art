<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marker — point the camera here</title>
  <style>
    html, body { margin: 0; height: 100%; background: #fff; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
    img { max-width: 96vw; max-height: 82vh; object-fit: contain;
          box-shadow: 0 6px 30px rgba(0,0,0,0.25); }
    p { font: 14px -apple-system, system-ui, sans-serif; color: #333; margin: 0 12px; text-align: center; }
  </style>
</head>
<body>
  <!-- The exact image the bundled target was compiled from. Point the app's
       camera at THIS to trigger detection. Open it on your phone or a second
       screen, or print it. -->
  <img src="../assets/example-card.png" alt="AR marker" />
  <p>Point the app's camera at this image — fill most of the frame, flat-on, well lit.</p>
</body>
</html>
